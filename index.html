<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Attendance System · UIPath Lab</title>
<script src="students.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<style>
body{font-family:sans-serif;background:#0b0b1a;color:#fff;padding:20px}
input,select,button{margin:5px;padding:8px}
</style>
</head>

<body>

<h2>ISE Dept · UI Path Lab Attendance</h2>

<h3>Student</h3>
<select id="stu-division">
<option value="A">A</option>
<option value="B">B</option>
</select>

<input id="stu-usn" placeholder="USN">
<input id="stu-token" placeholder="Token">

<button id="stu-submit-btn" onclick="submitAttendance()">Submit</button>
<div id="stu-result"></div>

<hr>

<h3>Professor</h3>
<input type="date" id="prof-date">
<input type="time" id="prof-period">

<button onclick="openSession()">Open</button>

<script>
const BIN_ID="69c2a5a0aa77b81da915600d";
const API_KEY="$2a$10$0r2BZmxFrzU01uqwZWEyeuWkt1cugfUAo3I4ze0RlCRsyjNXZEuFW";
const BASE="https://api.jsonbin.io/v3/b/"+BIN_ID;

async function apiGet(){
const r=await fetch(BASE+"/latest",{headers:{'X-Master-Key':API_KEY}});
return (await r.json()).record;
}

async function apiPut(data){
await fetch(BASE,{method:'PUT',
headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},
body:JSON.stringify(data)});
}

function randomToken(){return Math.floor(1000+Math.random()*9000);}

async function openSession(){
const data=await apiGet();
data.activeSession={
division:"A",
date:document.getElementById('prof-date').value,
period:document.getElementById('prof-period').value,
token:randomToken(),
present:[]
};
await apiPut(data);
alert("Session Opened. Token: "+data.activeSession.token);
}

function showError(msg){
document.getElementById('stu-result').innerText=msg;
document.getElementById('stu-submit-btn').disabled=false;
}

async function submitAttendance(){
const div=document.getElementById('stu-division').value;
const usn=document.getElementById('stu-usn').value.trim().toUpperCase();
const token=document.getElementById('stu-token').value.trim();

document.getElementById('stu-submit-btn').disabled=true;

const data=await apiGet();

if(data.activeSession.present.includes(usn)){
showError("Already marked!");

document.getElementById('stu-usn').disabled=true;
document.getElementById('stu-division').disabled=true;
document.getElementById('stu-token').disabled=true;
document.getElementById('stu-submit-btn').disabled=true;
return;
}

data.activeSession.present.push(usn);
await apiPut(data);

document.getElementById('stu-result').innerText="Marked!";
}
</script>

</body>
</html>
