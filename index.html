<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>UI Path Lab Attendance</title>

<script src="students.js"></script>

<style>
body{margin:0;font-family:sans-serif;background:#0b0b1a;color:#fff}
header{background:#000;padding:15px;text-align:center;font-size:22px}
.container{padding:20px}
.card{background:#151530;margin:15px 0;padding:20px;border-radius:10px;text-align:center}
button{padding:10px 20px;margin:5px;border:none;border-radius:5px;cursor:pointer}
.green{background:#28a745;color:#fff}
.blue{background:#007bff;color:#fff}
.red{background:#dc3545;color:#fff}
input,select{padding:8px;margin:5px}
.hidden{display:none}
</style>
</head>

<body>

<header>ISE Dept · UI Path Lab Attendance</header>

<div class="container">

<div id="login">
<div class="card hidden" id="profcard">
<h2>Professor</h2>
<button class="green" onclick="showProfessor()">Open Dashboard</button>
</div>

<div class="card">
<h2>Student</h2>
<button class="blue" onclick="showStudent()">Mark Attendance</button>
</div>
</div>

<div id="student" class="hidden">
<div class="card">
<h3>Student Attendance</h3>

<select id="stu-division">
<option value="A">Division A</option>
<option value="B">Division B</option>
</select>

<input id="stu-usn" placeholder="Enter USN">
<input id="stu-token" placeholder="Token">

<button id="stu-submit-btn" class="green" onclick="submitAttendance()">Submit</button>
<div id="stu-result"></div>

</div>
</div>

<div id="prof" class="hidden">
<div class="card">

<select id="prof-division">
<option value="A">Division A</option>
<option value="B">Division B</option>
</select>

<input type="date" id="prof-date">
<input type="time" id="prof-period">

<button class="green" onclick="openSession()">Open</button>
<button class="blue" onclick="pauseSession()">Pause</button>
<button class="green" onclick="resumeSession()">Resume</button>
<button class="red" onclick="closeSession()">Close</button>

<h2 id="status">CLOSED</h2>
<div id="tokenDisplay"></div>
<div id="timer"></div>

</div>

<div class="card">
<h3>Live Attendance</h3>
<ul id="presentList"></ul>
</div>

<div class="card">
<h3>Absent</h3>
<ul id="absentList"></ul>
</div>

</div>

</div>

<script>

const BIN_ID="69c2a5a0aa77b81da915600d";
const API_KEY="$2a$10$0r2BZmxFrzU01uqwZWEyeuWkt1cugfUAo3I4ze0RlCRsyjNXZEuFW";
const BASE="https://api.jsonbin.io/v3/b/"+BIN_ID;

let timerInterval;

async function apiGet(){
let r=await fetch(BASE+"/latest",{headers:{'X-Master-Key':API_KEY}});
return (await r.json()).record;
}

async function apiPut(data){
await fetch(BASE,{method:'PUT',
headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},
body:JSON.stringify(data)});
}

function hideAll(){
login.style.display="none";
student.style.display="none";
prof.style.display="none";
}

function showStudent(){hideAll();student.style.display="block";}
function showProfessor(){hideAll();prof.style.display="block";loadData();setInterval(loadData,2000);}

function randomToken(){return Math.floor(1000+Math.random()*9000);}

async function openSession(){
let data=await apiGet();

data.activeSession={
division:document.getElementById('prof-division').value,
date:document.getElementById('prof-date').value,
period:document.getElementById('prof-period').value,
token:randomToken(),
present:[]
};

await apiPut(data);

status.innerText="OPEN";
tokenDisplay.innerText="Token: "+data.activeSession.token;

startTimer();
}

function startTimer(){
let t=300;
timerInterval=setInterval(()=>{
t--;
let m=Math.floor(t/60);
let s=t%60;
if(s<10)s="0"+s;
timer.innerText="Time "+m+":"+s;
if(t<=0) closeSession();
},1000);
}

async function closeSession(){
let data=await apiGet();
data.sessions.push(data.activeSession);
data.activeSession=null;
await apiPut(data);
status.innerText="CLOSED";
clearInterval(timerInterval);
}

async function pauseSession(){
status.innerText="PAUSED";
}

async function resumeSession(){
status.innerText="OPEN";
}

async function submitAttendance(){

let data=await apiGet();

let usn=document.getElementById('stu-usn').value.trim().toUpperCase();

if(data.activeSession.present.includes(usn)){
document.getElementById('stu-result').innerText="Already marked!";

document.getElementById('stu-usn').disabled=true;
document.getElementById('stu-division').disabled=true;
document.getElementById('stu-token').disabled=true;
document.getElementById('stu-submit-btn').disabled=true;

return;
}

data.activeSession.present.push(usn);
await apiPut(data);

document.getElementById('stu-result').innerText="Marked!";
}

async function loadData(){
let data=await apiGet();
if(!data.activeSession) return;

let sess=data.activeSession;

presentList.innerHTML="";
sess.present.forEach(u=>{
let li=document.createElement("li");
li.innerText=u;
presentList.appendChild(li);
});

absentList.innerHTML="";
STUDENTS[sess.division].forEach(s=>{
if(!sess.present.includes(s.id)){
let li=document.createElement("li");
li.innerText=s.id+" - "+s.name;
absentList.appendChild(li);
}
});
}

document.addEventListener("DOMContentLoaded",()=>{
let p=new URLSearchParams(location.search);
if(p.get("prof")=="1")profcard.classList.remove("hidden");
});

</script>

</body>
</html>
